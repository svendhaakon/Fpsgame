<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FPS GAME CLEAN</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui {
position:absolute;
top:10px;
left:10px;
color:white;
font-family:Arial;
z-index:10;
}

#crosshair {
position:absolute;
top:50%;
left:50%;
width:10px;
height:10px;
transform:translate(-50%,-50%);
color:white;
z-index:20;
}

#menu {
position:absolute;
inset:0;
background:rgba(0,0,0,0.9);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:100;
}

button {
padding:15px 30px;
font-size:20px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="menu">
<h1>FPS GAME</h1>
<button onclick="startGame()">PLAY</button>
</div>

<div id="ui">
Score: <span id="score">0</span><br>
Health: <span id="health">100</span><br>
Highscore: <span id="highscore">0</span>
</div>

<div id="crosshair">+</div>

<script src="https://unpkg.com/three@0.165.0/build/three.min.js"></script>

<script>
/* ================= STATE ================= */
let gameStarted = false;

let score = 0;
let health = 100;
let highscore = localStorage.getItem("highscore") || 0;

let grenades = 0;
let boss = null;

const enemies = [];
const flyingEnemies = [];
const bullets = [];
const grenadePickups = [];
const walls = [];

const keys = {};
let velocityY = 0;
let onGround = true;

/* ================= SCENE ================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.y = 2;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(10,20,10);
scene.add(sun);

/* FLOOR */
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x2ecc71})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* ================= INPUT ================= */
document.addEventListener("keydown",(e)=>{

keys[e.key.toLowerCase()] = true;

if(e.key.toLowerCase() === "f") shoot();
if(e.key.toLowerCase() === "g") throwGrenade();

if(e.code === "Space" && onGround){
velocityY = 0.25;
onGround = false;
}

});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

/* ================= MOUSE LOOK ================= */
let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove",(e)=>{
if(!gameStarted) return;

yaw -= e.movementX * 0.002;
pitch -= e.movementY * 0.002;

pitch = Math.max(-1.5,Math.min(1.5,pitch));

camera.rotation.order = "YXZ";
camera.rotation.y = yaw;
camera.rotation.x = pitch;
});

/* ================= SHOOT ================= */
function shoot(){

const bullet = new THREE.Mesh(
new THREE.SphereGeometry(0.1),
new THREE.MeshBasicMaterial({color:0xffff00})
);

bullet.position.copy(camera.position);

bullet.dir = new THREE.Vector3();
camera.getWorldDirection(bullet.dir);

scene.add(bullet);
bullets.push(bullet);
}

/* ================= GRENADES ================= */
function spawnGrenadePickup(){

const g = new THREE.Mesh(
new THREE.CylinderGeometry(0.5,0.5,0.2,20),
new THREE.MeshStandardMaterial({color:0x006600})
);

g.position.set(
(Math.random()-0.5)*100,
0.2,
(Math.random()-0.5)*100
);

scene.add(g);
grenadePickups.push(g);
}

for(let i=0;i<10;i++) spawnGrenadePickup();

function throwGrenade(){

if(grenades <= 0) return;
grenades--;

const pos = camera.position.clone();

for(const e of enemies){
if(pos.distanceTo(e.position) < 10){
scene.remove(e);
}
}

updateUI();
}

/* ================= ENEMIES ================= */
function spawnEnemy(){

const e = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xff0000})
);

e.position.set((Math.random()-0.5)*50,1,-30);

scene.add(e);
enemies.push(e);
}

setInterval(()=>{
if(gameStarted && enemies.length < 10) spawnEnemy();
},2000);

/* ================= FLYING ================= */
function spawnFlyingEnemy(){

const e = new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0x00ffff})
);

e.position.set((Math.random()-0.5)*50,5,-40);

scene.add(e);
flyingEnemies.push(e);
}

setInterval(()=>{
if(gameStarted && flyingEnemies.length < 5) spawnFlyingEnemy();
},4000);

/* ================= WALLS ================= */
for(let i=0;i<20;i++){

const w = new THREE.Mesh(
new THREE.BoxGeometry(2,3,2),
new THREE.MeshStandardMaterial({color:0x555555})
);

w.position.set((Math.random()-0.5)*80,1,-Math.random()*80);

scene.add(w);
walls.push(w);
}

/* ================= BOSS ================= */
function spawnBoss(){

boss = new THREE.Mesh(
new THREE.BoxGeometry(6,6,6),
new THREE.MeshStandardMaterial({color:0x550000})
);

boss.health = 100;
boss.position.set(0,3,-60);

scene.add(boss);
}

/* ================= GAME START ================= */
function startGame(){
gameStarted = true;
document.getElementById("menu").style.display = "none";
}

/* ================= GAME OVER ================= */
function gameOver(){

gameStarted = false;

if(score > highscore){
highscore = score;
localStorage.setItem("highscore", highscore);
}

alert("Game Over! Score: " + score);
location.reload();
}

/* ================= UPDATE UI ================= */
function updateUI(){
document.getElementById("score").innerText = score;
document.getElementById("health").innerText = Math.floor(health);
document.getElementById("highscore").innerText = highscore;
}

/* ================= LOOP ================= */
function animate(){

requestAnimationFrame(animate);

if(!gameStarted){
renderer.render(scene,camera);
return;
}

/* movement */
const forward = new THREE.Vector3();
camera.getWorldDirection(forward);
forward.y = 0;

const right = new THREE.Vector3();
right.crossVectors(forward, camera.up);

if(keys["w"]) camera.position.addScaledVector(forward,0.2);
if(keys["s"]) camera.position.addScaledVector(forward,-0.2);
if(keys["a"]) camera.position.addScaledVector(right,-0.2);
if(keys["d"]) camera.position.addScaledVector(right,0.2);

/* bullets */
for(let i=bullets.length-1;i>=0;i--){

const b = bullets[i];
b.position.addScaledVector(b.dir,0.7);

for(let j=enemies.length-1;j>=0;j--){
if(b.position.distanceTo(enemies[j].position) < 1){
scene.remove(enemies[j]);
enemies.splice(j,1);

scene.remove(b);
bullets.splice(i,1);

score += 10;
updateUI();
break;
}
}
}

/* boss spawn */
if(score > 100 && !boss) spawnBoss();

/* boss move */
if(boss){

const dir = new THREE.Vector3(
camera.position.x - boss.position.x,
0,
camera.position.z - boss.position.z
).normalize();

boss.position.addScaledVector(dir,0.05);

if(boss.position.distanceTo(camera.position) < 3){
health -= 1;
if(health <= 0) gameOver();
}
}

/* enemies move */
for(const e of enemies){
const dir = camera.position.clone().sub(e.position).normalize();
e.position.addScaledVector(dir,0.03);
}

/* flying */
for(const e of flyingEnemies){
const dir = camera.position.clone().sub(e.position).normalize();
e.position.addScaledVector(dir,0.04);
}

/* pickups */
for(let i=grenadePickups.length-1;i>=0;i--){
if(grenadePickups[i].position.distanceTo(camera.position) < 2){
grenades++;
scene.remove(grenadePickups[i]);
grenadePickups.splice(i,1);
}
}

renderer.render(scene,camera);
}

animate();

/* ================= RESIZE ================= */
window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
